<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>NodeSeek 自动签到</title>
  <style>
    body {
      width: 370px;
      margin: 0;
      padding: 14px;
      font-family: "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #222;
      background: #fafafa;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .card {
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 14px;
    }
    input[type="number"] {
      width: 58px;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      background: #1f6feb;
      color: #fff;
      font-size: 14px;
    }
    button.secondary {
      background: #666;
    }
    button.danger {
      background: #b42318;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .small {
      color: #666;
      font-size: 12px;
      line-height: 1.5;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.45;
      background: #f5f5f5;
      border-radius: 8px;
      padding: 8px;
      max-height: 180px;
      overflow: auto;
    }
    .ok { color: #0a7a25; }
    .bad { color: #c22; }
    .tip {
      background: #fff8e1;
      border: 1px solid #f1d28a;
      border-radius: 8px;
      padding: 8px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>NodeSeek 自动签到 v1.1</h1>

  <div class="card">
    <label>
      <input id="enabled" type="checkbox">
      启用自动签到
    </label>
    <label>
      <input id="autoWhenVisit" type="checkbox">
      访问 NodeSeek 页面时自动尝试一次
    </label>
    <label>
      <input id="openTabOnAlarm" type="checkbox">
      每日定时到点自动打开 NodeSeek 页面签到
    </label>
    <label>
      <input id="notify" type="checkbox">
      开启浏览器通知
    </label>

    <div class="row">
      <span>每日定时：</span>
      <input id="hour" type="number" min="0" max="23">
      <span>时</span>
      <input id="minute" type="number" min="0" max="59">
      <span>分</span>
    </div>

    <p id="nextAlarm" class="small"></p>

    <div class="row">
      <button id="saveBtn">保存设置</button>
      <button id="signBtn" class="secondary">立即签到</button>
      <button id="forceBtn" class="secondary">强制重试</button>
      <button id="resetBtn" class="danger">清除今日记录</button>
    </div>

    <div class="tip small">
      v1.1 不再由扩展后台直接请求接口，而是在 NodeSeek 页面上下文里执行 fetch。请先在 Edge 里正常登录 NodeSeek。
    </div>
  </div>

  <div class="card">
    <div id="status" class="small">正在读取状态...</div>
    <pre id="result"></pre>
  </div>

  <script src="popup.js"></script>
</body>
</html>
